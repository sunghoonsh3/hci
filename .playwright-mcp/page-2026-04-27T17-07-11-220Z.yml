              - heading "Description" [level=2] [ref=e93]
              - paragraph [ref=e94]: "This course explores the phenomenon of Shakespeare and film, concentrating on the ranges of meaning provoked by the conjunction. We shall be looking at examples of films of Shakespeare plays both early and recent, both in English and in other languages, and both ones that stick close to the conventionalized and historicized conceptualizations of Shakespeare and adaptations at varying degrees of distance toward the erasure of Shakespeare from the text. The transportation of different forms of Shakespearean textualities (printed, theatrical, filmic) and the confrontation with the specificities of film produce a cultural phenomenon whose cultural meanings - meanings as Shakespeare and meanings as film - will be the subject of our investigations. Students will be required to view screenings of films on a regular basis during the semester. Note: this course is delivered fully online. The course design combines required live weekly meetings online with self-scheduled lectures, problems, assignments, and interactive learning materials. To participate, students will need to have a computer with webcam, reliable internet connection, and a quiet place to participate in live sessions. Cannot have taken: FTT 40600 , FTT 44600, FTT 60600"
